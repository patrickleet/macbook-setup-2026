# =============================================================================
# mise.toml — Declarative dev tools config
# Symlinked to ~/.config/mise/config.toml by init.sh
# =============================================================================

[settings]
auto_install = true

# =============================================================================
# Dev tool runtimes
# =============================================================================
[tools]
node = "lts"
python = "latest"
rust = "latest"
go = "latest"

# =============================================================================
# CLI tools from mise registry
# =============================================================================
jq = "latest"
kubectl = "latest"
helm = "latest"
"aqua:txn2/kubefwd" = "latest"
lima = "latest"
colima = "latest"
docker-cli = "latest"
docker-compose = "latest"
yq = "latest"
sops = "latest"
aws-cli = "latest"
gh = "latest"
pipx = "latest"
"pipx:gimme-aws-creds" = "latest"
"pipx:git-filter-repo" = "latest"

# =============================================================================
# Go-installed CLI tools
# =============================================================================
"go:github.com/cloudflare/cloudflare-go/cmd/flarectl" = "latest"

# =============================================================================
# npm global tools
# =============================================================================
"npm:typescript" = "latest"
"npm:@openai/codex" = "latest"

# =============================================================================
# Tools installed from GitHub releases
# =============================================================================
"github:charmbracelet/glow" = "latest"
"github:gitkb/atc" = "latest"
"github:hops-ops/hops-cli" = { version = "latest", rename_exe = "hops" }
"github:knative/client" = "latest"
"github:unbounded-tech/vnext" = "latest"
"github:harmony-labs/meta" = "latest"

[tools."http:up"]
version = "current"

[tools."http:up".platforms]
linux-x64 = { url = "https://cli.upbound.io/stable/{{version}}/bin/linux_amd64/up", bin = "up" }
linux-arm64 = { url = "https://cli.upbound.io/stable/{{version}}/bin/linux_arm64/up", bin = "up" }
macos-x64 = { url = "https://cli.upbound.io/stable/{{version}}/bin/darwin_amd64/up", bin = "up" }
macos-arm64 = { url = "https://cli.upbound.io/stable/{{version}}/bin/darwin_arm64/up", bin = "up" }

[tools."http:crossplane"]
version = "current"

[tools."http:crossplane".platforms]
linux-x64 = { url = "https://releases.crossplane.io/stable/{{version}}/bin/linux_amd64/crank", bin = "crossplane" }
linux-arm64 = { url = "https://releases.crossplane.io/stable/{{version}}/bin/linux_arm64/crank", bin = "crossplane" }
macos-x64 = { url = "https://releases.crossplane.io/stable/{{version}}/bin/darwin_amd64/crank", bin = "crossplane" }
macos-arm64 = { url = "https://releases.crossplane.io/stable/{{version}}/bin/darwin_arm64/crank", bin = "crossplane" }

[tools."github:harmony-labs/gitkb-releases"]
version = "latest"

[tools."github:harmony-labs/gitkb-releases".platforms]
linux-x64 = { asset_pattern = "gitkb-linux-amd64.tar.gz" }
linux-arm64 = { asset_pattern = "gitkb-linux-arm64.tar.gz" }
macos-x64 = { asset_pattern = "gitkb-darwin-amd64.tar.gz" }
macos-arm64 = { asset_pattern = "gitkb-darwin-arm64.tar.gz" }
